name: ci
on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...
      - name: build
        run: go build -o build/fleet-qa-mcp ./cmd/fleet-qa-mcp
      - name: MCP smoke (initialize + tools/list)
        run: |
          out=$(printf '%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
            | ./build/fleet-qa-mcp)
          echo "$out" | grep -q '"browser_sample_frames"' || { echo "tools/list missing expected tool"; exit 1; }
          echo "MCP smoke OK"
