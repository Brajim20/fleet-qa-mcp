<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fleet QA Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>window.__qaErr=null;window.addEventListener('error',function(e){if(!window.__qaErr)window.__qaErr=(e.message||String(e.error))+' @ '+(e.filename||'').split('/').pop()+':'+(e.lineno||'');});</script>
<script src="./vendor/react.production.min.js"></script>
<script src="./vendor/react-dom.production.min.js"></script>
<script src="./vendor/babel.min.js"></script>
<style>
  :root{
    --font-sans:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --font-mono:ui-monospace,"SF Mono","Roboto Mono",Menlo,Consolas,monospace;
  }
  html,body{margin:0;padding:0;height:100%;}
  /* ---- design tokens (from the .dc.html helmet) ---- */
  .qa{
    --bg:#0d0f13; --surface:#1a1f27; --surface2:#242a33; --well:#14181f; --border:#333a45;
    --text:#bebebf; --text2:#d6dae4; --text3:#969db0;
    --accent:#00c28b; --accent-over:#00a878; --accent-tint:rgba(0,194,139,.15);
    --green:#00c28b; --green-over:#00a878; --purple:#ae6ddf;
    --danger:#ff5c83; --success:#3db67b; --warning:#ebbc43; --error:#d66c7b;
    --code-bg:#11152b; --code-fg:#e8eaf0;
  }
  .qa.theme-light{
    --bg:#f9fafc; --surface:#ffffff; --surface2:#f4f4f6; --well:#f4f4f6; --border:#e2e4ea;
    --text:#1a1c21; --text2:#515774; --text3:#8b8fa2;
    --accent-tint:rgba(0,194,139,.10);
    --code-bg:#192147; --code-fg:#e8eaf0;
  }
  .qa, .qa *{ box-sizing:border-box; }
  .qa ::-webkit-scrollbar{ width:10px; height:10px; }
  .qa ::-webkit-scrollbar-thumb{ background:var(--border); border-radius:6px; }
  .qa ::-webkit-scrollbar-track{ background:transparent; }
  @keyframes qa-spin{ to{ transform:rotate(360deg); } }
  @keyframes qa-fade{ from{ transform:translateY(5px); } to{ transform:none; } }
  @keyframes qa-pulse{ 0%,100%{ opacity:1; } 50%{ opacity:.4; } }
  .qa-spin{ animation:qa-spin 1s linear infinite; }
  .qa-fade{ animation:qa-fade .25s ease; }
  /* indeterminate top progress bar, shown while any /api/ call is in flight */
  @keyframes qa-bar{ 0%{ left:-35%; width:35%; } 60%{ width:55%; } 100%{ left:100%; width:35%; } }
  .qa-bar{ position:fixed; top:0; left:0; right:0; height:3px; background:transparent; z-index:120; overflow:hidden; }
  .qa-bar > span{ position:absolute; top:0; height:100%; background:linear-gradient(90deg, transparent, var(--accent), var(--accent-over)); border-radius:0 3px 3px 0; animation:qa-bar 1.1s cubic-bezier(.4,0,.2,1) infinite; }
  /* skeleton shimmer for loading lists */
  @keyframes qa-shimmer{ 0%{ background-position:-450px 0; } 100%{ background-position:450px 0; } }
  .qa-shimmer{ background-image:linear-gradient(90deg, var(--surface) 0px, var(--surface2) 80px, var(--surface) 160px); background-size:450px 100%; animation:qa-shimmer 1.15s linear infinite; border-radius:5px; }
  /* bouncing dots for the investigation overlay */
  @keyframes qa-bounce{ 0%,80%,100%{ transform:scale(.5); opacity:.45; } 40%{ transform:scale(1); opacity:1; } }
  .qa-dot{ display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--accent); animation:qa-bounce 1.2s ease-in-out infinite; }
  .qa textarea{ font-family:var(--font-mono); }
  .qa button{ font-family:var(--font-sans); cursor:pointer; }
  .qa a{ text-decoration:none; }
</style>
</head>
<body>
<div id="app"></div>

<script type="text/babel" data-presets="react">
/** @jsxRuntime classic */
const { useState, useEffect, useRef } = React;

// CSS string -> React style object (keeps the design's inline styles verbatim).
function S(str){
  const o = {};
  if (!str) return o;
  str.split(';').forEach(rule => {
    const i = rule.indexOf(':');
    if (i < 0) return;
    let k = rule.slice(0, i).trim();
    const val = rule.slice(i + 1).trim();
    if (!k) return;
    k = k.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
    o[k] = val;
  });
  return o;
}
// tiny inline-SVG helper
const Svg = ({d, w=16, h=16, fill='none', stroke='currentColor', sw=2, vb='0 0 24 24', style, children}) =>
  <svg width={w} height={h} viewBox={vb} fill={fill} stroke={stroke} strokeWidth={sw}
       strokeLinecap="round" strokeLinejoin="round" style={style}>
    {d ? d.split('|').map((p,i)=><path key={i} d={p}/>) : children}
  </svg>;

// Target instance resolution (mirrors the fleet-qa-mcp resolver):
//   ?instance=<url> query param  →  DEFAULT_INSTANCE  →  localhost fallback.
const DEFAULT_INSTANCE = 'https://brayan.ngrok.app';   // ← your instance; set '' to fall back to localhost
const INSTANCE_URL = (new URLSearchParams(location.search).get('instance') || DEFAULT_INSTANCE || 'http://localhost:8080').replace(/\/+$/,'');
const INSTANCE_HOST = (() => { try { return new URL(INSTANCE_URL).host; } catch(e){ return INSTANCE_URL; } })();
const shortVer = (v) => (v||'').replace(/\.\d{6,}.*$/,'');   // "4.87.0-rc.2606171916" → "4.87.0-rc"

// Official Fleet logo — the colored dot "F" (from fleetdm/fleet assets/images/fleet-logo.svg)
const FleetLogo = ({size=26}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" style={{flex:'none',display:'block'}}>
    <circle cx="2.98" cy="3"  r="2.98" fill="#63C740"/>
    <circle cx="11.91" cy="3"  r="2.98" fill="#5CABDF"/>
    <circle cx="20.84" cy="3"  r="2.98" fill="#D66C7B"/>
    <circle cx="2.98" cy="12" r="2.98" fill="#C98DEF"/>
    <circle cx="11.91" cy="12" r="2.98" fill="#FAA669"/>
    <circle cx="2.98" cy="21" r="2.98" fill="#3AEFC4"/>
  </svg>
);

// ===================== APP LOGIC (ported from the .dc.html DCLogic) =====================
class Studio extends React.Component {
  state = {
    theme: 'dark', view: 'dashboard', activeId: null, openSteps: {}, modal: null,
    verdict: null, confirmed: {}, copied: false, targetOpen: false,
    urlInput: 'https://github.com/fleetdm/fleet/issues/47712', toast: null, running: false, runTick: 0,
    // Resolved target instance (version/rev filled live from the instance when reachable).
    inst: { version: '4.87.0-rc.2606171916', rev: '9c17a71c43', tier: 'Premium', built: 'Jun 17, 2026 19:16 UTC', connected: true },
    // LIVE mode — set true when served by the fleet-qa-mcp `serve` backend.
    // In live mode, investigations actually run against the deployed build.
    live: false, liveList: [], liveReports: {}, busy: false, busyMsg: '', busyPhase: 0,
    liveVerdict: {}, liveConfirmed: {}, pending: 0,
    // QA queue (real open bugs) + generated-spec modal.
    queue: [], queueLoading: false, queueType: 'bug', queueGroup: '#g-software', queueStatus: '', queueMilestone: '', milestones: [], spec: null,
    // Smoke suite runner.
    smokeAvail: null, smokeMsg: '', smokeDir: '', smokeGroups: [], smokeGroup: '', smokeRun: null, smokeRunning: false,
  };
  // Fleet engineering product groups (the #g-* labels) for the queue filter,
  // matching the org's project boards (github.com/orgs/fleetdm/projects).
  GROUPS = ['#g-software','#g-mdm','#g-security-compliance','#g-first-impressions','#g-orchestration','#g-power-to-pc'];
  // Status chip colors. GitHub Project board statuses (when a read:project token
  // is available) come first; the label-derived fallbacks follow.
  STATUS_CHIP = {
    // GitHub Project board columns (emoji prefixes stripped server-side)
    'Inbox':{bg:'rgba(139,143,162,.18)',fg:'#9ea2b5'},
    'Waiting':{bg:'rgba(139,143,162,.18)',fg:'#9ea2b5'},
    'Blocked':{bg:'rgba(255,92,131,.15)',fg:'#ff5c83'},
    'Ready to estimate':{bg:'rgba(92,171,223,.16)',fg:'#5cabdf'},
    'Ready':{bg:'rgba(92,171,223,.16)',fg:'#5cabdf'},
    'In progress':{bg:'rgba(106,103,254,.16)',fg:'#8b89ff'},
    'In review':{bg:'rgba(201,141,239,.16)',fg:'#c98def'},
    'Awaiting QA':{bg:'rgba(235,188,67,.16)',fg:'#d6a32e'},
    'Ready for release':{bg:'rgba(58,239,196,.15)',fg:'#3aefc4'},
    'Done':{bg:'rgba(61,182,123,.16)',fg:'#3db67b'},
    // Label-derived fallback statuses (no read:project token)
    'Release':{bg:'rgba(58,239,196,.15)',fg:'#3aefc4'},
    'In QA':{bg:'rgba(235,188,67,.16)',fg:'#d6a32e'},
    'Product':{bg:'rgba(201,141,239,.16)',fg:'#c98def'},
    'Reproduce':{bg:'rgba(235,188,67,.16)',fg:'#d6a32e'},
    'Incoming':{bg:'rgba(139,143,162,.18)',fg:'#9ea2b5'},
    'Triage':{bg:'rgba(139,143,162,.18)',fg:'#9ea2b5'},
  };
  // Bright dark-mode fgs read as washed-out/too bright on the light surface —
  // map them to a deeper shade (with a stronger tint) when the theme is light.
  LIGHT_CHIP = {
    '#3aefc4':{fg:'#0a8f6e',bg:'rgba(0,154,125,.13)'},
    '#3db67b':{fg:'#1f9d63',bg:'rgba(31,157,99,.12)'},
    '#5cabdf':{fg:'#2b7fb8',bg:'rgba(43,127,184,.12)'},
    '#8b89ff':{fg:'#5b58e0',bg:'rgba(91,88,224,.12)'},
    '#c98def':{fg:'#9b54d6',bg:'rgba(155,84,214,.12)'},
  };
  chipColors(status){
    const c = this.STATUS_CHIP[status] || this.STATUS_CHIP['Triage'];
    if (this.state.theme==='light' && this.LIGHT_CHIP[c.fg]) return this.LIGHT_CHIP[c.fg];
    return c;
  }

  componentDidMount(){
    // Drive the top progress bar off in-flight /api/ calls — one place, every
    // callback. Wraps fetch so individual call sites stay unchanged.
    if (!window.__qaFetchWrapped) {
      const orig = window.fetch.bind(window);
      window.fetch = (...args) => {
        const u = args[0];
        const track = typeof u === 'string' && u.indexOf('/api/') === 0;
        if (track) this.setState(s => ({ pending: s.pending + 1 }));
        return orig(...args).finally(() => { if (track) this.setState(s => ({ pending: Math.max(0, s.pending - 1) })); });
      };
      window.__qaFetchWrapped = true;
    }
    // Is the fleet-qa-mcp backend serving us? If so, switch to LIVE mode and
    // drive real investigations. If not (e.g. GitHub Pages), stay in demo mode
    // with the mock data, and best-effort read the instance version directly.
    fetch('/api/health').then(r => r.ok ? r.json() : null).then(h => {
      if (h && h.ok) {
        this.setState(s => ({ live: true, agent: !!h.agent, inst: { ...s.inst,
          version: h.version || s.inst.version, rev: (h.rev||s.inst.rev).slice(0,10),
          tier: (h.tier ? h.tier[0].toUpperCase()+h.tier.slice(1) : s.inst.tier),
          connected: !!h.connected, built: '' } }));
        this.loadLiveList();
      } else {
        this.demoVersionProbe();
      }
    }).catch(() => this.demoVersionProbe());
  }

  demoVersionProbe(){
    fetch(INSTANCE_URL + '/api/latest/fleet/version', { headers: { 'ngrok-skip-browser-warning': 'true' } })
      .then(r => r.ok ? r.json() : null)
      .then(v => { if (v && v.version) this.setState(s => ({ inst: { ...s.inst, version: v.version, rev: (v.revision || s.inst.rev).slice(0,10), connected: true } })); })
      .catch(() => {});
  }

  // ---- LIVE backend helpers ----
  loadLiveList(){
    fetch('/api/investigations').then(r=>r.json())
      .then(d => this.setState({ liveList: d.investigations || [] })).catch(()=>{});
  }
  // The deterministic pipeline's phases — cycled in the busy overlay to give a
  // real sense of progress during the (~30s) investigation call.
  BUSY_PHASES = ['Fetching the issue','Resolving the deployed build','Reproducing — live API + real browser','Reading source at the deployed revision','Released or unreleased?','Drafting the result'];
  runLive = (issueRef) => this.runMode(issueRef, '');
  runMode = (issueRef, mode) => {
    const m = (issueRef||'').match(/(\d{3,7})/);
    const label = m ? '#'+m[1] : 'issue';
    const verb = mode==='reproduce' ? 'Reproducing ' : mode==='testplan' ? 'Running the test plan for ' : 'Investigating ';
    clearInterval(this._bp);
    this.setState({ busy:true, busyPhase:0, busyMsg: verb + label + ' against ' + INSTANCE_HOST });
    this._bp = setInterval(() => this.setState(s => ({ busyPhase: Math.min(s.busyPhase+1, this.BUSY_PHASES.length-1) })), 2600);
    const done = () => clearInterval(this._bp);
    fetch('/api/investigate', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ issue: issueRef, mode }) })
      .then(r=>r.json())
      .then(rep => {
        done();
        if (rep.error && (!rep.steps || !rep.steps.length)) { this.setState({ busy:false, toast:'Investigation failed: '+rep.error }); this.flashToast(); return; }
        this.setState(s => ({ busy:false, view:'detail', activeId:rep.number, modal:null, targetOpen:false,
          liveReports:{...s.liveReports, [rep.number]:rep},
          openSteps: rep.steps.reduce((o,_,i)=>(o['live-'+i]=i<2, o), {}) }));
        this.loadLiveList();
      })
      .catch(e => { done(); this.setState({ busy:false, toast:'Investigation error: '+e.message }); this.flashToast(); });
  };
  openLive = (n) => {
    const cached = this.state.liveReports[n];
    if (cached) { this.showLive(cached); return; }
    fetch('/api/report?number='+n).then(r => r.ok ? r.json() : null).then(rep => {
      if (rep) { this.setState(s=>({liveReports:{...s.liveReports,[n]:rep}})); this.showLive(rep); }
      else { this.runLive(String(n)); }   // not run this session → run it now
    }).catch(()=>this.runLive(String(n)));
  };
  showLive(rep){
    this.setState({ view:'detail', activeId:rep.number, modal:null, targetOpen:false,
      openSteps: rep.steps.reduce((o,_,i)=>(o['live-'+i]=true, o), {}) });
  }
  // ---- QA queue ----
  goQueue = () => { this.setState({ view:'queue', targetOpen:false, modal:null }); this.loadQueue(); if (!this.state.milestones.length) this.loadMilestones(); };
  loadQueue(){
    this.setState({ queueLoading:true });
    let url = '/api/queue?type='+encodeURIComponent(this.state.queueType);
    if (this.state.queueGroup) url += '&group='+encodeURIComponent(this.state.queueGroup);
    if (this.state.queueMilestone) url += '&milestone='+encodeURIComponent(this.state.queueMilestone);
    fetch(url)
      .then(r=>r.json())
      .then(d => this.setState({ queue:d.issues||[], queueLoading:false }))
      .catch(()=>this.setState({ queueLoading:false, toast:'Could not load the queue' }));
  }
  loadMilestones(){
    fetch('/api/milestones').then(r=>r.json()).then(d => this.setState({ milestones:d.milestones||[] })).catch(()=>{});
  }
  setQueueType = (e) => this.setState({ queueType:e.target.value }, () => this.loadQueue());            // server-side
  setQueueGroup = (e) => this.setState({ queueGroup:e.target.value }, () => this.loadQueue());         // server-side
  setQueueMilestone = (e) => this.setState({ queueMilestone:e.target.value }, () => this.loadQueue()); // server-side
  setQueueStatus = (e) => this.setState({ queueStatus:e.target.value });                                // client-side
  // ---- smoke suite ----
  goSmokes = () => { this.setState({ view:'smokes', targetOpen:false, modal:null }); if (this.state.smokeAvail===null) this.loadSmokes(); };
  loadSmokes(){
    fetch('/api/smokes').then(r=>r.json())
      .then(d => this.setState({ smokeAvail:!!d.available, smokeMsg:d.message||'', smokeDir:d.dir||'', smokeGroups:d.groups||[] }))
      .catch(()=>this.setState({ smokeAvail:false, smokeMsg:'Could not reach the smoke runner' }));
  }
  setSmokeGroup = (e) => this.setState({ smokeGroup:e.target.value });
  runSmokes = () => {
    if (this.state.smokeRunning) return;
    this.setState({ smokeRunning:true, smokeRun:null });
    fetch('/api/smokes/run', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ group:this.state.smokeGroup }) })
      .then(async r => { const run = await r.json().catch(()=>({})); if (!r.ok) return { error: run.error || ('Server returned HTTP '+r.status+(r.status===404?' — restart the server (make studio) to pick up the smoke runner.':'')), results:[] }; return run; })
      .then(run => this.setState({ smokeRunning:false, smokeRun:{ results:[], ...run } }))
      .catch(e => this.setState({ smokeRunning:false, smokeRun:{ error:'Could not reach the smoke runner: '+e.message, results:[] } }));
  };

  // ---- generated Playwright spec ----
  genSpec = (n) => {
    fetch('/api/spec', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ number:n }) })
      .then(r=>r.json())
      .then(d => { if (d.error) { this.setState({toast:d.error}); this.flashToast(); return; } this.setState({ modal:'spec', spec:{...d, number:n, saving:false, saved:false} }); })
      .catch(e => { this.setState({toast:'Spec error: '+e.message}); this.flashToast(); });
  };
  saveSpec = () => {
    const sp = this.state.spec; if (!sp) return;
    this.setState(s => ({ spec:{...s.spec, saving:true} }));
    fetch('/api/spec/save', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ number:sp.number }) })
      .then(r=>r.json())
      .then(d => {
        if (d.error) { this.setState(s=>({ spec:{...s.spec, saving:false}, toast:d.error })); this.flashToast(); return; }
        this.setState(s => ({ spec:{...s.spec, saving:false, saved:true}, toast:(d.overwrote?'Overwrote ':'Saved ')+d.saved }));
        this.flashToast();
      })
      .catch(e => { this.setState(s=>({ spec:{...s.spec, saving:false}, toast:'Save error: '+e.message })); this.flashToast(); });
  };
  copySpec = () => { try{ navigator.clipboard && navigator.clipboard.writeText(this.state.spec.content); }catch(e){} this.setState({toast:'Spec copied'}); this.flashToast(); };

  selectVerdictLive = (n, v) => this.setState(s => ({ liveVerdict:{...s.liveVerdict,[n]:v}, liveConfirmed:{...s.liveConfirmed,[n]:false} }));
  confirmVerdictLive = (n) => {
    const v = this.state.liveVerdict[n] || (this.state.liveReports[n]||{}).status;
    fetch('/api/verdict', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ number:n, verdict:v }) }).catch(()=>{});
    this.setState(s => ({ liveConfirmed:{...s.liveConfirmed,[n]:true}, toast:'Verdict confirmed: '+v }));
    this.flashToast(); this.loadLiveList();
  };

  investigations = [
    { number:47712, title:'Self-service: editing software on a team with no categories errors the Categories picker',
      status:'Fixed', verdict:'Fixed', area:'#g-software', reporter:'rachelle-fleet', reportedVersion:'4.86.1', updated:'12m ago', confirmed:true, kindSet:'rich-fixed' },
    { number:43310, title:'Switching between policies briefly displays previous policy content',
      status:'Confirmed bug', verdict:'Confirmed bug', area:'#g-mdm', reporter:'noah-talerman', reportedVersion:'4.86.0', updated:'1h ago', confirmed:true, kindSet:'rich-flash' },
    { number:46920, title:'Dark mode: settings nav background desyncs from table on theme toggle',
      status:'Not a bug', verdict:'Not a bug', area:'#g-mdm', reporter:'jacob-shandling', reportedVersion:'4.85.3', updated:'4h ago', confirmed:true, kindSet:'rich-desync' },
    { number:47655, title:'macOS host shows "Pending" MDM status after successful enrollment',
      status:'In progress', verdict:'Confirmed bug', area:'#g-mdm', reporter:'george-karr', reportedVersion:'4.86.1', updated:'2h ago', confirmed:false, kindSet:'light' },
    { number:47301, title:'Query results CSV export drops the last row when over 1000 hosts',
      status:'Cannot reproduce', verdict:'Cannot reproduce', area:'#g-orchestration', reporter:'lucas-manuel', reportedVersion:'4.84.0', updated:'yesterday', confirmed:true, kindSet:'light' },
    { number:47488, title:'Bulk-delete hosts confirm modal closes without deleting on Firefox',
      status:'In progress', verdict:'Confirmed bug', area:'#g-orchestration', reporter:'sgress454', reportedVersion:'4.86.1', updated:'3h ago', confirmed:false, kindSet:'light' },
  ];
  CHIP = {
    'Fixed':{bg:'rgba(61,182,123,.15)',fg:'#3db67b'},
    'Confirmed bug':{bg:'rgba(255,92,131,.15)',fg:'#ff5c83'},
    'Not a bug':{bg:'rgba(139,143,162,.18)',fg:'#9ea2b5'},
    'In progress':{bg:'rgba(106,103,254,.16)',fg:'#6a67fe'},
    'Cannot reproduce':{bg:'rgba(235,188,67,.16)',fg:'#d6a32e'},
  };
  VERDICTS = ['Fixed','Confirmed bug','Not a bug','Cannot reproduce'];
  SHORT = { 'Fixed':'Fixed', 'Confirmed bug':'Bug', 'Not a bug':'Not a bug', 'In progress':'In progress', 'Cannot reproduce':'No repro' };
  // Current user — shown in the sidebar and verdict confirmations.
  // Set to your GitHub username (or full name).
  USER = { name: 'Brajim20', role: 'QA engineer' };
  get userInitials(){ return (this.USER.name || '?').replace(/[^A-Za-z0-9]/g,'').slice(0,2).toUpperCase(); }

  invByNumber(n){ return this.investigations.find(i => i.number === n); }
  get active(){ return this.invByNumber(this.state.activeId); }

  goDashboard = () => this.setState({ view:'dashboard', targetOpen:false, modal:null });
  goNew = () => this.setState({ view:'new', targetOpen:false, modal:null });
  toggleTheme = () => this.setState(s => ({ theme: s.theme==='dark'?'light':'dark' }));
  toggleTarget = () => this.setState(s => ({ targetOpen: !s.targetOpen }));
  closeModal = () => this.setState({ modal:null });
  stop = (e) => e.stopPropagation();

  openInv = (n) => {
    if (this.state.live) { this.openLive(n); return; }
    const inv = this.invByNumber(n); const light = inv.kindSet === 'light';
    this.setState({ view:'detail', activeId:n, targetOpen:false, modal:null, verdict:inv.verdict,
      openSteps: light ? {issue:true} : {issue:true,reproduce:true,rootcause:true,buildcheck:true},
      running:false, runTick: light ? 2 : 99 });
  };
  runFromInput = () => {
    if (this.state.live) { this.runLive(this.state.urlInput); return; }
    const m = (this.state.urlInput||'').match(/(\d{4,6})/);
    const n = m ? parseInt(m[1],10) : 47712;
    this.openInv(this.invByNumber(n) ? n : 47712);
  };
  onUrlInput = (e) => this.setState({ urlInput: e.target.value });
  toggleStep = (k) => this.setState(s => ({ openSteps:{...s.openSteps,[k]:!s.openSteps[k]} }));
  expandAll = () => { const o={}; this.stepKinds().forEach(k=>o[k]=true); this.setState({openSteps:o}); };
  collapseAll = () => this.setState({ openSteps:{} });
  stepKinds(){ return ['issue','target','reproduce','rootcause','buildcheck','verdict','draft']; }

        {step.fields.map((f,i)=><div key={i}><div style={S("color:var(--text3); font-size:11px; margin-bottom:3px;")}>{f.k}</div><div style={S("color:var(--text); font-family:var(--font-mono); font-size:13px;")}>{f.v}</div></div>)}
      </div>
      <div style={S("display:flex; gap:9px; padding:11px 13px; background:var(--well); border-radius:6px; font-size:12.5px; color:var(--text2);")}>

      </div>
    </>);
    if (step._isReproApi) return (<>
      <div style={S("display:flex; align-items:center; gap:10px; margin-bottom:10px;")}>
        <span style={S("font-family:var(--font-mono); font-size:11px; font-weight:600; background:var(--accent-tint); color:var(--accent); padding:3px 8px; border-radius:4px;")}>{step.api.method}</span>
        <span style={S("font-family:var(--font-mono); font-size:12px; color:var(--text2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;")}>{step.api.path}</span>
        <span style={S("margin-left:auto; font-family:var(--font-mono); font-size:12px; color:var(--success); flex:none;")}>{step.api.status} OK</span>
        <span style={S("display:inline-flex; align-items:center; gap:4px; font-size:10.5px; color:var(--text3); flex:none;")}><Svg w={12} h={12}><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></Svg>read-only</span>
      </div>
      <pre style={S("margin:0 0 14px; background:var(--code-bg); color:var(--code-fg); padding:14px; border-radius:6px; font-size:12.5px; line-height:1.6; overflow:auto;")}>{step.api.body}</pre>
      <div style={S("display:flex; gap:9px; padding:11px 13px; background:rgba(61,182,123,.10); border:1px solid rgba(61,182,123,.3); border-radius:6px; font-size:12.5px; color:var(--text2); margin-bottom:16px;")}>
        <Svg w={15} h={15} stroke="var(--success)" sw={2.4} style={S("flex:none; margin-top:1px;")} d="M20 6 9 17l-5-5"/><span>{step.apiNote}</span>
      </div>
      <div style={S("color:var(--text3); font-size:11px; letter-spacing:.05em; text-transform:uppercase; margin-bottom:8px;")}>Browser screenshots</div>
      <div style={S("display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px;")}>
        {step.shots.map((sh,i)=><div key={i} style={S("border:1px solid var(--border); border-radius:6px; overflow:hidden; background:var(--well);")}><div style={sh.thumbStyle}>{sh.mock}</div><div style={S("padding:8px 10px; font-size:11.5px; color:var(--text2); border-top:1px solid var(--border);")}>{sh.label}</div></div>)}
      </div>
      <div style={S("font-family:var(--font-mono); font-size:11.5px; color:var(--text3); margin-bottom:12px;")}>{step.domMeasure}</div>
      <div style={S("display:flex; gap:9px; padding:11px 13px; background:var(--well); border-radius:6px; font-size:12.5px; color:var(--text2);")}><Svg w={15} h={15} stroke="var(--warning)" style={S("flex:none; margin-top:1px;")} d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z|M12 9v4M12 17h.01"/><span>{step.caveat}</span></div>
    </>);
    if (step._isSampler) return (<>
      <div style={S("display:flex; align-items:center; gap:10px; font-size:12.5px; color:var(--text2); margin-bottom:6px;")}><Svg w={15} h={15} stroke="var(--accent)" d="M3 12h4l3-8 4 16 3-8h4"/><span style={S("font-weight:600; color:var(--text);")}>Per-frame sampler</span><span style={S("font-family:var(--font-mono); color:var(--text3);")}>{step.samplerMeta}</span></div>
      <div style={S("font-size:12px; color:var(--text3); margin-bottom:12px;")}>Trigger: {step.trigger}</div>
      <div style={S("background:var(--well); border:1px solid var(--border); border-radius:8px; padding:14px 14px 8px;")}>
        <svg viewBox="0 0 640 168" style={{width:'100%',height:'auto',display:'block'}} preserveAspectRatio="none">
          <line x1="40" y1="10" x2="40" y2="140" stroke="var(--border)" strokeWidth="1"/>
          <line x1="40" y1="140" x2="630" y2="140" stroke="var(--border)" strokeWidth="1"/>
          <line x1="40" y1="75" x2="630" y2="75" stroke="var(--border)" strokeWidth="1" strokeDasharray="3 4"/>
          {step.flash && <><rect x={step.flash.x} y="10" width={step.flash.w} height="130" fill="rgba(255,92,131,.12)"/><text x={step.flash.tx} y="24" fill="var(--danger)" fontSize="11" fontFamily="var(--font-mono)">{step.flash.label}</text></>}
          {step.series.map((ser,i)=><polyline key={i} points={ser.points} fill="none" stroke={ser.color} strokeWidth="2.2" strokeLinejoin="round"/>)}
          <text x="6" y="18" fill="var(--text3)" fontSize="10" fontFamily="var(--font-mono)">1.0</text>
          <text x="6" y="144" fill="var(--text3)" fontSize="10" fontFamily="var(--font-mono)">0.0</text>
        </svg>
        <div style={S("display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:10px; color:var(--text3); padding:0 0 4px 40px;")}><span>f0</span><span>f{step.lastFrame}</span></div>
      </div>
      <div style={S("display:flex; gap:18px; flex-wrap:wrap; margin:12px 0;")}>{step.series.map((ser,i)=><span key={i} style={S("display:inline-flex; align-items:center; gap:7px; font-size:12px; color:var(--text2);")}><span style={{width:'14px',height:'3px',borderRadius:'2px',background:ser.color}}/>{ser.name}</span>)}</div>
      <div style={{display:'flex',gap:'9px',padding:'11px 13px',borderRadius:'6px',fontSize:'12.5px',color:'var(--text2)',...step.verdictNoteStyle}}><span style={{flex:'none',marginTop:'1px'}}>{step.verdictNoteIcon}</span><span>{step.samplerNote}</span></div>
      <div style={S("display:flex; gap:9px; padding:11px 13px; background:var(--well); border-radius:6px; font-size:12.5px; color:var(--text2); margin-top:10px;")}><Svg w={15} h={15} stroke="var(--warning)" style={S("flex:none; margin-top:1px;")} d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z|M12 9v4M12 17h.01"/><span>{step.caveat}</span></div>
    </>);
    if (step._isRoot) return (<>
      <div style={S("display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap;")}><Svg w={14} h={14} stroke="var(--text3)" d="m16 18 6-6-6-6M8 6l-6 6 6 6"/><span style={S("font-family:var(--font-mono); font-size:12px; color:var(--text2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;")}>{step.file}</span><span style={S("font-family:var(--font-mono); font-size:11px; color:var(--accent); background:var(--accent-tint); padding:2px 7px; border-radius:4px; flex:none;")}>@ {step.fileRev}</span></div>
      <div style={S("background:var(--code-bg); border-radius:6px; overflow:hidden; margin-bottom:14px; font-family:var(--font-mono); font-size:12.5px; line-height:1.7;")}>
        {step.diff.map((line,i)=><div key={i} style={{display:'flex',padding:'0 14px',...line.rowStyle}}><span style={{width:'14px',flex:'none',opacity:.7}}>{line.prefix}</span><span style={{whiteSpace:'pre-wrap'}}>{line.text}</span></div>)}
      </div>
      <div style={S("font-family:var(--font-mono); font-size:12px; color:var(--text3); margin-bottom:14px;")}>$ {step.grep}</div>
      <div style={S("display:flex; gap:9px; padding:11px 13px; background:var(--accent-tint); border-radius:6px; font-size:12.5px; color:var(--text);")}><Svg w={15} h={15} stroke="var(--accent)" style={S("flex:none; margin-top:1px;")}><circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3"/></Svg><span>{step.found}</span></div>
    </>);
    if (step._isBuild) return (<>
      <div style={S("font-size:13px; color:var(--text2); margin-bottom:14px;")}>{step.question}</div>
      <div style={{display:'flex',alignItems:'center',gap:'14px',padding:'16px',borderRadius:'8px',marginBottom:'14px',...step.answerBoxStyle}}><span style={step.answerBadgeStyle}>{step.answerBadge}</span><span style={{color:'var(--text)',fontWeight:600,fontSize:'15px'}}>{step.answerHeadline}</span></div>
      <div style={S("display:flex; flex-direction:column; gap:1px; background:var(--border); border:1px solid var(--border); border-radius:6px; overflow:hidden;")}>
        {step.rows.map((row,i)=><div key={i} style={S("display:flex; align-items:center; gap:12px; padding:11px 14px; background:var(--surface);")}><span style={row.iconStyle}>{row.ok ? <Svg w={12} h={12} sw={3} d="M20 6 9 17l-5-5"/> : <Svg w={12} h={12} sw={3} d="M18 6 6 18M6 6l12 12"/>}</span><span style={S("font-family:var(--font-mono); font-size:12.5px; color:var(--text);")}>{row.k}</span><span style={S("margin-left:auto; font-size:12px; color:var(--text3);")}>{row.v}</span></div>)}
      </div>
      <div style={S("font-size:12px; color:var(--text3); margin-top:12px;")}>{step.detail}</div>
    </>);
    if (step._isVerdict) return (<>
      <p style={S("color:var(--text2); font-size:13px; line-height:1.6; margin:0 0 12px;")}>The tool proposes a verdict from the evidence above. A human reviews and confirms it in the panel on the right.</p>
      <div style={S("display:flex; align-items:center; gap:10px; font-size:13px; color:var(--text2);")}><span style={S("color:var(--text3);")}>Proposed:</span><span style={{display:'inline-flex',alignItems:'center',gap:'7px',padding:'5px 12px',borderRadius:'20px',fontWeight:600,background:this.renderVals().inv.chipBg,color:this.renderVals().inv.chipFg}}><span style={{width:'6px',height:'6px',borderRadius:'50%',background:this.renderVals().inv.chipFg}}/>{this.renderVals().inv.verdict}</span></div>
    </>);
    if (step._isDraft) return (<>
      <p style={S("color:var(--text2); font-size:13px; line-height:1.6; margin:0 0 14px;")}>A bug-report issue is prefilled from the evidence. You review every field and submit it manually — Fleet QA Studio never auto-posts.</p>
      <button onClick={this.openDraft} style={S("display:inline-flex; align-items:center; gap:8px; height:38px; padding:0 16px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text); font-weight:600; font-size:13px;")}><Svg w={15} h={15} fill="currentColor" stroke="none" d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49v-1.7c-2.78.62-3.37-1.21-3.37-1.21-.46-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.62.07-.62 1 .07 1.53 1.06 1.53 1.06.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.36-2.22-.26-4.55-1.14-4.55-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.27 2.75 1.05a9.4 9.4 0 0 1 5 0c1.91-1.32 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.06.36.32.68.94.68 1.9v2.81c0 .27.18.6.69.49A10.26 10.26 0 0 0 22 12.25C22 6.58 17.52 2 12 2z"/>Open prefilled issue draft</button>
    </>);
    return <div style={S("color:var(--text3); font-size:12.5px;")}>Run this step to gather evidence.</div>;
  }

  renderDetail(v){
    const inv = v.inv;
    return (
      <div className="qa-fade" style={S("max-width:1080px; margin:0 auto; padding:28px 32px 80px;")}>
        <button onClick={this.goDashboard} style={S("display:inline-flex; align-items:center; gap:6px; background:transparent; border:none; color:var(--text3); font-size:12.5px; margin-bottom:14px; padding:0;")}><Svg w={15} h={15} d="m15 18-6-6 6-6"/>All investigations</button>
        <div style={S("display:flex; align-items:flex-start; gap:16px; margin-bottom:6px;")}>
          <h1 style={S("color:var(--text); font-size:22px; line-height:1.3; flex:1; margin:0;")}>{inv.title}</h1>
          <span style={{display:'inline-flex',alignItems:'center',gap:'7px',padding:'6px 14px',borderRadius:'20px',fontSize:'13px',fontWeight:600,background:inv.chipBg,color:inv.chipFg,flex:'none',whiteSpace:'nowrap'}}><span style={{width:'7px',height:'7px',borderRadius:'50%',background:inv.chipFg}}/>{inv.status}</span>
        </div>
        <div style={S("display:flex; align-items:center; gap:14px; color:var(--text3); font-size:12.5px; margin-bottom:24px; flex-wrap:wrap;")}>
          <a href="#" style={S("font-family:var(--font-mono); color:var(--accent); font-size:12.5px;")}>fleetdm/fleet#{inv.number}</a>
          <span>·</span><span>{inv.area}</span><span>·</span><span>reported by {inv.reporter}</span><span>·</span><span>Fleet {inv.reportedVersion}</span>
        </div>
        <div style={S("display:grid; grid-template-columns:1fr 320px; gap:28px; align-items:start;")}>
          {/* TIMELINE */}
          <div>
            <div style={S("display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;")}>
              <span style={S("color:var(--text); font-weight:600; font-size:15px;")}>Evidence timeline</span>
              <div style={S("display:flex; gap:6px;")}>
                <button onClick={this.expandAll} style={S("height:30px; padding:0 12px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text2); font-size:12px;")}>Expand all</button>
                <button onClick={this.collapseAll} style={S("height:30px; padding:0 12px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text2); font-size:12px;")}>Collapse</button>
              </div>
            </div>
            {v.hasQueued && (
              <div style={S("display:flex; align-items:center; gap:12px; padding:14px 16px; background:var(--surface); border:1px solid var(--border); border-radius:8px; margin-bottom:14px;")}>
                <Svg w={18} h={18} stroke="var(--accent)" d="M5 3l14 9-14 9V3z"/><span style={S("flex:1; color:var(--text2); font-size:13px;")}>Steps 3–7 are queued. Run them to gather evidence against the deployed build.</span>
                <button onClick={this.runRemaining} style={S("height:34px; padding:0 16px; background:var(--accent); color:#fff; border:none; border-radius:6px; font-weight:600; font-size:13px;")}>{v.runLabel}</button>
              </div>
            )}
            <div style={S("display:flex; flex-direction:column;")}>
              {v.steps.map((step,i)=>(
                <div key={i} style={S("display:flex; gap:14px;")}>
                  <div style={S("display:flex; flex-direction:column; align-items:center; flex:none; width:30px;")}>
                    <div style={step.nodeStyle}>
                      {step._done && <Svg w={14} h={14} sw={3} d="M20 6 9 17l-5-5"/>}
                      {step._running && <span className="qa-spin" style={{width:'13px',height:'13px',border:'2px solid currentColor',borderTopColor:'transparent',borderRadius:'50%',display:'block'}}/>}
                      {step._queued && <span style={{fontSize:'11px',fontWeight:600}}>{step.idx}</span>}
                    </div>
                    <div style={step.connectorStyle}/>
                  </div>
                  <div style={S("flex:1; min-width:0; margin-bottom:12px;")}>
                    <button onClick={step.onToggle} style={{...S("width:100%; display:flex; align-items:center; gap:12px; text-align:left; background:var(--surface); border:1px solid var(--border); padding:13px 16px; color:var(--text2);"), borderRadius: step._open ? '8px 8px 0 0' : '8px'}}>
                      <span style={S("color:var(--text3); font-family:var(--font-mono); font-size:11px; flex:none;")}>{step.tool}</span>
                      <span style={S("color:var(--text); font-weight:600; font-size:13.5px; flex:none;")}>{step.title}</span>
                      <span style={S("color:var(--text3); font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0;")}>— {step.summary}</span>
                      {step._queued && <span style={S("color:var(--text3); font-size:11px; flex:none;")}>queued</span>}
                      <Svg w={16} h={16} style={{color:'var(--text3)',flex:'none',transition:'transform .2s',...step.chevronStyle}} d="m6 9 6 6 6-6"/>
                    </button>
                    {step._open && (
                      <div className="qa-fade" style={S("border:1px solid var(--border); border-top:none; border-radius:0 0 8px 8px; margin-top:-1px; padding:18px; background:var(--surface);")}>
                        {this.renderStepBody(step)}
                      </div>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </div>
          {/* VERDICT PANEL */}
          <div style={S("position:sticky; top:0;")}>
            <div style={S("background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:18px;")}>
              <div style={S("display:flex; align-items:center; gap:8px; margin-bottom:4px;")}>
                <span style={S("color:var(--text); font-weight:600; font-size:15px;")}>Verdict</span>
                <span style={S("margin-left:auto; font-size:10.5px; color:var(--text3); display:inline-flex; align-items:center; gap:4px;")}><Svg w={12} h={12} d="M16 7a4 4 0 1 0-8 0M3 21h18M5 21V11h14v10"/>You decide</span>
              </div>
              <p style={S("color:var(--text3); font-size:12px; line-height:1.5; margin:0 0 14px;")}>The tool gathers evidence and proposes. A human owns the call — confirm it below.</p>
              <div style={S("display:flex; flex-direction:column; gap:7px; margin-bottom:16px;")}>
                {v.verdictOptions.map((opt,i)=>(
                  <button key={i} onClick={opt.onSelect} style={opt.optStyle}>
                    <span style={{width:'14px',height:'14px',borderRadius:'50%',flex:'none',border:'2px solid '+opt.ring,display:'flex',alignItems:'center',justifyContent:'center'}}>{opt.selected && <span style={{width:'7px',height:'7px',borderRadius:'50%',background:opt.color}}/>}</span>
                    <span style={{fontWeight:600,fontSize:'13px',color:'var(--text)'}}>{opt.label}</span>
                    {opt.isProposed && <span style={S("margin-left:auto; font-size:10px; color:var(--text3); background:var(--well); padding:2px 6px; border-radius:4px;")}>proposed</span>}
                  </button>
                ))}
              </div>
              {v.verdictConfirmed
                ? <div style={S("display:flex; align-items:center; gap:8px; padding:10px 12px; background:rgba(61,182,123,.10); border:1px solid rgba(61,182,123,.3); border-radius:6px; color:var(--success); font-size:12.5px; font-weight:600; margin-bottom:14px;")}><Svg w={15} h={15} sw={2.4} d="M20 6 9 17l-5-5"/>Confirmed by {v.confirmedBy}</div>
                : <button onClick={this.confirmVerdict} style={S("width:100%; height:40px; background:var(--accent); color:#fff; border:none; border-radius:6px; font-weight:600; font-size:13.5px; margin-bottom:14px;")}>Confirm verdict</button>}
              <div style={S("color:var(--text3); font-size:11px; letter-spacing:.05em; text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between;")}>
                <span>QA comment</span>
                <button onClick={this.copyComment} style={S("background:transparent; border:none; color:var(--accent); font-size:11px; font-weight:600; display:inline-flex; align-items:center; gap:4px; padding:0;")}><Svg w={12} h={12}><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></Svg>{v.copyLabel}</button>
              </div>
              <textarea readOnly value={v.qaComment} style={S("width:100%; height:148px; resize:none; background:var(--well); border:1px solid var(--border); border-radius:6px; padding:11px; color:var(--text2); font-size:12px; line-height:1.6; outline:none;")}/>
              <button onClick={this.openDraft} style={S("width:100%; height:40px; margin-top:12px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text); font-weight:600; font-size:13px; display:flex; align-items:center; justify-content:center; gap:8px;")}><Svg w={15} h={15} fill="currentColor" stroke="none" d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49v-1.7c-2.78.62-3.37-1.21-3.37-1.21-.46-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.62.07-.62 1 .07 1.53 1.06 1.53 1.06.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.36-2.22-.26-4.55-1.14-4.55-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.27 2.75 1.05a9.4 9.4 0 0 1 5 0c1.91-1.32 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.06.36.32.68.94.68 1.9v2.81c0 .27.18.6.69.49A10.26 10.26 0 0 0 22 12.25C22 6.58 17.52 2 12 2z"/>Draft GitHub issue</button>
            </div>
            <div style={S("margin-top:14px; padding:13px 15px; background:var(--surface); border:1px solid var(--border); border-radius:8px; display:flex; gap:9px;")}><Svg w={15} h={15} stroke="var(--text3)" style={S("flex:none; margin-top:1px;")}><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></Svg><span style={S("font-size:11.5px; color:var(--text3); line-height:1.5;")}>Reads are free. Live-instance writes and issue submission always require an explicit confirm.</span></div>
          </div>
        </div>
      </div>
    );
  }

  renderSmokes(v){
    const selStyle = S("height:34px; padding:0 10px; background:var(--surface); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:12.5px;");

    const dot = (st) => ({passed:'var(--success)',failed:'var(--danger)',skipped:'var(--text3)'}[st]||'var(--text3)');

      <div className="qa-fade" style={S("max-width:1080px; margin:0 auto; padding:32px;")}>
        <h1 style={S("color:var(--text); font-size:24px; margin:0 0 4px;")}>Smoke tests</h1>
        <p style={S("color:var(--text3); font-size:14px; margin:0 0 20px;")}>Runs your Playwright smoke suite from the checkout against <b style={{color:'var(--text2)'}}>{INSTANCE_HOST}</b> — the same <span style={S("font-family:var(--font-mono);")}>npm run test:smoke</span>, read-only on the repo.</p>

        {v.smokeAvail===false && (
          <div style={S("display:flex; gap:10px; padding:14px 16px; background:var(--well); border:1px solid var(--border); border-radius:8px; color:var(--text2); font-size:13px;")}>
            <Svg w={16} h={16} stroke="var(--warning)" sw={2.2} style={S("flex:none; margin-top:1px;")} d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z|M12 9v4M12 17h.01"/>
            <span>{v.smokeMsg}</span>
          </div>
        )}

        {v.smokeAvail && (<>
          <div style={S("display:flex; gap:10px; align-items:center; margin-bottom:18px; flex-wrap:wrap;")}>
            <span style={S("color:var(--text3); font-size:12px;")}>Suite</span>
            <select value={v.smokeGroup} onChange={this.setSmokeGroup} disabled={v.smokeRunning} style={selStyle}>
              <option value="">All smoke tests</option>
              {v.smokeGroups.map(g => <option key={g} value={g}>{g}</option>)}

            <button onClick={this.runSmokes} disabled={v.smokeRunning} style={S("height:34px; padding:0 18px; background:var(--accent); color:#1a1c21; border:none; border-radius:6px; font-weight:600; font-size:13px; opacity:"+(v.smokeRunning?'.6':'1')+";")}>
              {v.smokeRunning ? 'Running…' : 'Run smokes'}
            </button>
            <span style={S("color:var(--text3); font-size:11.5px;")}>{v.smokeDir}</span>
          </div>

          {v.smokeRunning && (
            <div style={S("display:flex; align-items:center; gap:12px; padding:16px; background:var(--surface); border:1px solid var(--border); border-radius:8px; margin-bottom:16px;")}>
              <span className="qa-spin" style={{width:'18px',height:'18px',border:'2.5px solid var(--accent)',borderTopColor:'transparent',borderRadius:'50%',display:'block',flex:'none'}}/>
              <span style={S("color:var(--text2); font-size:13px;")}>Running the {v.smokeGroup||'full'} smoke suite against {INSTANCE_HOST}… this can take a few minutes.</span>
            </div>
          )}

          {run && !v.smokeRunning && (<>
            {run.error
              ? <div style={S("display:flex; gap:10px; padding:14px 16px; background:rgba(255,92,131,.10); border:1px solid rgba(255,92,131,.3); border-radius:8px; color:var(--text2); font-size:13px;")}><Svg w={16} h={16} stroke="var(--danger)" sw={2.2} style={S("flex:none; margin-top:1px;")} d="M12 9v4M12 17h.01|M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><span>{run.error}</span></div>
              : (run.results||[]).length===0
              ? <div style={S("display:flex; gap:10px; padding:14px 16px; background:var(--well); border:1px solid var(--border); border-radius:8px; color:var(--text2); font-size:13px;")}><Svg w={16} h={16} stroke="var(--warning)" sw={2.2} style={S("flex:none; margin-top:1px;")} d="M12 9v4M12 17h.01|M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><span>No specs ran. Usually the e2e auth setup failed — check that the instance is reachable and the admin token is valid (the server terminal logs the Playwright output).</span></div>
              : (<>
                <div style={S("display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:18px;")}>
                  {[['Passed',run.passed,'#3db67b'],['Failed',run.failed,'#ff5c83'],['Skipped',run.skipped,'#8b8fa2'],['Duration',Math.round(run.durationMs/1000)+'s','#6a67fe']].map(([lbl,val,col])=>(
                    <div key={lbl} style={S("background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px 18px;")}>
                      <div style={{fontSize:'26px',fontWeight:600,color:col,fontVariantNumeric:'tabular-nums',lineHeight:1}}>{val}</div>
                      <div style={S("color:var(--text3); font-size:12.5px; margin-top:6px;")}>{lbl}</div>
                    </div>
                  ))}
                </div>
                <div style={S("background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden;")}>
                  {run.results.map((res,i)=>(
                    <div key={i} style={S("display:grid; grid-template-columns:20px minmax(0,1fr) 70px; gap:12px; align-items:center; padding:11px 18px; border-bottom:1px solid var(--border);")}>
                      <span style={{width:'10px',height:'10px',borderRadius:'50%',background:dot(res.status),flex:'none'}}/>
                      <span style={S("min-width:0;")}>
                        <span style={S("display:block; color:var(--text); font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;")}>{res.title}</span>
                        <span style={S("display:block; color:var(--text3); font-size:11px; font-family:var(--font-mono); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;")}>{res.file.replace('tests/smoke/','')}{res.error?' — '+res.error:''}</span>
                      </span>
                      <span style={{textAlign:'right',fontSize:'11.5px',fontWeight:600,color:dot(res.status),textTransform:'uppercase'}}>{res.status}</span>
                    </div>
                  ))}
                </div>
              </>)}
          </>)}
        </>)}
      </div>
    );
  }

  renderQueue(v){
    const selStyle = S("height:34px; padding:0 10px; background:var(--surface); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:12.5px;");
    // Status options = those present in the current results, plus All.
    const statusesPresent = Array.from(new Set(v.queue.map(i=>i.status).filter(Boolean)));
    const rows = v.queue.filter(i => !v.queueStatus || i.status===v.queueStatus);
    return (
      <div className="qa-fade" style={S("max-width:1080px; margin:0 auto; padding:32px;")}>
        <div style={S("display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:6px;")}>
          <h1 style={S("color:var(--text); font-size:24px; margin:0;")}>QA queue</h1>
          <button onClick={()=>this.loadQueue()} style={S("height:34px; padding:0 14px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text2); font-size:12.5px;")}>Refresh</button>
        </div>
        <p style={S("color:var(--text3); font-size:14px; margin:0 0 16px;")}>Open <b style={{color:'var(--text2)'}}>{v.queueType==='all'?'':v.queueType+' '}</b>issues in fleetdm/fleet — pick one to investigate against the live build.</p>
        <div style={S("display:flex; gap:10px; align-items:center; margin-bottom:18px; flex-wrap:wrap;")}>
          <span style={S("color:var(--text3); font-size:12px;")}>Type</span>
          <select value={v.queueType} onChange={this.setQueueType} style={selStyle}>
            <option value="bug">Bugs</option>
            <option value="story">Stories</option>
            <option value="all">All issues</option>
          </select>
          <span style={S("color:var(--text3); font-size:12px; margin-left:8px;")}>Product group</span>
          <select value={v.queueGroup} onChange={this.setQueueGroup} style={selStyle}>
            <option value="">All groups</option>
            {this.GROUPS.map(g => <option key={g} value={g}>{g}</option>)}
          </select>
          <span style={S("color:var(--text3); font-size:12px; margin-left:8px;")}>Milestone</span>
          <select value={v.queueMilestone} onChange={this.setQueueMilestone} style={selStyle}>
            <option value="">All milestones</option>
            {v.milestones.map(m => <option key={m.number} value={m.number}>{m.title} ({m.openIssues})</option>)}
          </select>
          <span style={S("color:var(--text3); font-size:12px; margin-left:8px;")}>Status</span>
          <select value={v.queueStatus} onChange={this.setQueueStatus} style={selStyle}>
            <option value="">All statuses</option>
            {statusesPresent.map(st => <option key={st} value={st}>{st}</option>)}
          </select>
          <span style={S("margin-left:auto; color:var(--text3); font-size:12px;")}>{rows.length} issue{rows.length===1?'':'s'}</span>
        </div>
        <div style={S("background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden;")}>
          {v.queueLoading && Array.from({length:7}).map((_,i)=>(
            <div key={'sk'+i} style={S("display:grid; grid-template-columns:64px minmax(0,1fr) 120px 150px; gap:16px; align-items:center; padding:15px 20px; border-bottom:1px solid var(--border);")}>
              <div className="qa-shimmer" style={{height:'12px',width:'42px'}}/>
              <div><div className="qa-shimmer" style={{height:'12px',width:(62-i*4)+'%'}}/><div className="qa-shimmer" style={{height:'9px',width:'34%',marginTop:'7px'}}/></div>
              <div className="qa-shimmer" style={{height:'20px',width:'92px',borderRadius:'20px'}}/>
              <div className="qa-shimmer" style={{height:'30px',width:'92px',justifySelf:'end'}}/>
            </div>
          ))}
          {!v.queueLoading && rows.map(item=>{ const c=this.chipColors(item.status);
            const lbls=item.labels||[];
            const act = lbls.indexOf('bug')>=0 ? {label:'Reproduce',mode:'reproduce'} : lbls.indexOf('story')>=0 ? {label:'Test plan',mode:'testplan'} : {label:'Investigate',mode:''};
            return (
            <div key={item.number} style={S("display:grid; grid-template-columns:64px minmax(0,1fr) 120px 150px; gap:16px; align-items:center; padding:13px 20px; border-bottom:1px solid var(--border);")}>
              <a href={"https://github.com/fleetdm/fleet/issues/"+item.number} target="_blank" rel="noopener" style={S("font-family:var(--font-mono); font-size:12.5px; color:var(--accent);")}>#{item.number}</a>
              <span style={S("min-width:0;")}>
                <span style={S("display:block; color:var(--text); font-weight:600; font-size:13.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;")}>{item.title}</span>
                <span style={S("display:block; color:var(--text3); font-size:11.5px; margin-top:2px;")}>{item.group||'—'} · reported by {item.reporter}{item.milestone?' · 🏷 '+item.milestone:''}</span>
              </span>
              <span><span style={{display:'inline-flex',alignItems:'center',gap:'6px',padding:'4px 10px',borderRadius:'20px',fontSize:'11.5px',fontWeight:600,whiteSpace:'nowrap',background:c.bg,color:c.fg}}><span style={{width:'6px',height:'6px',borderRadius:'50%',background:c.fg}}/>{item.status}</span></span>
              <button onClick={()=>this.runMode(String(item.number), act.mode)} style={S("justify-self:end; height:32px; padding:0 14px; background:var(--accent); color:#1a1c21; border:none; border-radius:6px; font-weight:600; font-size:12.5px;")}>{act.label}</button>
            </div>
          );})}
          {!v.queueLoading && rows.length===0 && <div style={S("padding:30px; text-align:center; color:var(--text3); font-size:13px;")}>No open issues match this filter.</div>}
        </div>
      </div>
    );
  }

  renderSpec(v){

    return (
      <div onClick={this.closeModal} style={S("position:fixed; inset:0; background:rgba(25,33,71,.5); display:flex; align-items:flex-start; justify-content:center; padding:48px 24px; z-index:60; overflow:auto;")}>
        <div onClick={this.stop} className="qa-fade" style={S("width:760px; max-width:100%; background:var(--surface); border:1px solid var(--border); border-radius:12px; box-shadow:0 12px 40px rgba(0,0,0,.4); overflow:hidden;")}>
          <div style={S("display:flex; align-items:center; gap:10px; padding:16px 20px; border-bottom:1px solid var(--border);")}>
            <Svg w={18} h={18} stroke="var(--accent)" d="M3 12h4l3-8 4 16 3-8h4"/>
            <span style={S("color:var(--text); font-weight:600; font-size:15px;")}>Playwright regression test</span>
            {sp.exists && <span style={S("font-size:11px; color:var(--warning); background:var(--well); padding:3px 8px; border-radius:4px;")}>file exists — saving overwrites</span>}

          <div style={S("padding:20px; max-height:56vh; overflow:auto;")}>

            <div style={S("background:var(--well); border:1px solid var(--border); border-radius:6px; padding:10px 13px; color:var(--text); font-family:var(--font-mono); font-size:12px; margin-bottom:16px; overflow:auto;")}>{sp.path}</div>
            <div style={S("color:var(--text3); font-size:11px; letter-spacing:.05em; text-transform:uppercase; margin-bottom:6px;")}>Test</div>
            <pre style={S("margin:0; background:var(--code-bg); color:var(--code-fg); padding:14px; border-radius:6px; font-size:12px; line-height:1.6; overflow:auto; white-space:pre;")}>{sp.content}</pre>
          </div>
          <div style={S("display:flex; align-items:center; gap:12px; padding:16px 20px; border-top:1px solid var(--border); background:var(--bg);")}>
            <Svg w={15} h={15} stroke="var(--text3)" style={S("flex:none;")}><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></Svg>
            <span style={S("flex:1; font-size:12px; color:var(--text3);")}>Saving writes the file into your Fleet checkout under tools/qa/playwright. Review it before committing.</span>
            <button onClick={this.copySpec} style={S("height:38px; padding:0 14px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text2); font-weight:600; font-size:13px;")}>Copy</button>
            <button onClick={this.saveSpec} disabled={sp.saving} style={S("height:38px; padding:0 18px; background:var(--accent); color:#1a1c21; border:none; border-radius:6px; font-weight:600; font-size:13px;")}>{sp.saving?'Saving…':sp.saved?'Saved ✓':'Save to repo'}</button>
          </div>
        </div>
      </div>
    );
  }

  renderLiveDetail(rep, v){
    const s = this.state;
    const n = rep.number;
    const stColor = (st)=>({ok:'var(--success)',warn:'var(--warning)',error:'var(--danger)',info:'var(--text3)'}[st]||'var(--accent)');
    const status = s.liveVerdict[n] || rep.status || 'In progress';
    const chip = this.CHIP[status] || this.CHIP['In progress'];
    const confirmed = !!s.liveConfirmed[n];
    const selected = s.liveVerdict[n] || rep.status;
    return (
      <div className="qa-fade" style={S("max-width:1080px; margin:0 auto; padding:28px 32px 80px;")}>
        <button onClick={this.goDashboard} style={S("display:inline-flex; align-items:center; gap:6px; background:transparent; border:none; color:var(--text3); font-size:12.5px; margin-bottom:14px; padding:0;")}><Svg w={15} h={15} d="m15 18-6-6 6-6"/>All investigations</button>
        <div style={S("display:flex; align-items:flex-start; gap:16px; margin-bottom:6px;")}>
          <h1 style={S("color:var(--text); font-size:22px; line-height:1.3; flex:1; margin:0;")}>{rep.title}</h1>
          <span style={{display:'inline-flex',alignItems:'center',gap:'7px',padding:'6px 14px',borderRadius:'20px',fontSize:'13px',fontWeight:600,background:chip.bg,color:chip.fg,flex:'none',whiteSpace:'nowrap'}}><span style={{width:'7px',height:'7px',borderRadius:'50%',background:chip.fg}}/>{status}</span>
        </div>
        <div style={S("display:flex; align-items:center; gap:14px; color:var(--text3); font-size:12.5px; margin-bottom:24px; flex-wrap:wrap;")}>
          <a href={rep.issueUrl||'#'} target="_blank" rel="noopener" style={S("font-family:var(--font-mono); color:var(--accent); font-size:12.5px;")}>fleetdm/fleet#{n}</a>
          <span>·</span><span>{rep.group||'—'}</span><span>·</span><span>reported by {rep.reporter||'—'}</span><span>·</span>
          <span style={S("display:inline-flex; align-items:center; gap:5px; color:var(--success); font-weight:600;")}><span style={{width:'6px',height:'6px',borderRadius:'50%',background:'var(--success)'}}/>live · {rep.instance} · rev {(rep.rev||'').slice(0,8)}</span>
          {rep.releaseStatus && <span style={{display:'inline-flex',alignItems:'center',gap:'5px',padding:'2px 9px',borderRadius:'20px',fontSize:'11px',fontWeight:700,background:rep.releaseStatus==='Released'?'rgba(255,92,131,.15)':'rgba(61,182,123,.15)',color:rep.releaseStatus==='Released'?'#ff5c83':'#3db67b'}}>{rep.releaseStatus==='Released'?('RELEASED'+(rep.firstRelease?' · '+rep.firstRelease:'')):'UNRELEASED'}</span>}
        </div>
        <div style={S("display:grid; grid-template-columns:1fr 320px; gap:28px; align-items:start;")}>
          {/* TIMELINE */}
          <div>
            <div style={S("display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:14px; flex-wrap:wrap;")}>
              <span style={S("color:var(--text); font-weight:600; font-size:15px;")}>Evidence timeline</span>
              <div style={S("display:flex; gap:6px;")}>
                {(rep.labels||[]).indexOf('bug')>=0 && <button onClick={()=>this.runMode(String(n),'reproduce')} title="Perform the ticket's Steps to reproduce against the live build" style={S("height:30px; padding:0 12px; background:var(--accent-tint); border:1px solid var(--accent); border-radius:6px; color:var(--accent); font-weight:600; font-size:12px;")}>Reproduce steps</button>}
                {(rep.labels||[]).indexOf('story')>=0 && <button onClick={()=>this.runMode(String(n),'testplan')} title="Run the story's Test plan against the live build" style={S("height:30px; padding:0 12px; background:var(--accent-tint); border:1px solid var(--accent); border-radius:6px; color:var(--accent); font-weight:600; font-size:12px;")}>Run test plan</button>}
                <button onClick={()=>this.runLive(String(n))} style={S("height:30px; padding:0 12px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text2); font-size:12px;")}>Re-run</button>
              </div>
            </div>
            <div style={S("display:flex; flex-direction:column;")}>
              {rep.steps.map((step,i)=>{
                const open = !!s.openSteps['live-'+i]; const col = stColor(step.status);
                return (
                <div key={i} style={S("display:flex; gap:14px;")}>
                  <div style={S("display:flex; flex-direction:column; align-items:center; flex:none; width:30px;")}>
                    <div style={{width:'28px',height:'28px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',flex:'none',border:'2px solid',borderColor:col,background:step.status==='ok'?col:'var(--surface)',color:step.status==='ok'?'#fff':col}}>
                      {step.status==='ok' ? <Svg w={14} h={14} sw={3} d="M20 6 9 17l-5-5"/> : (step.status==='info' ? <span style={{width:'7px',height:'7px',borderRadius:'50%',background:col}}/> : <span style={{fontSize:'13px',fontWeight:700}}>!</span>)}
                    </div>
                    <div style={{width:'2px',flex:1,minHeight:'8px',background:'var(--border)',marginTop:'2px',marginBottom:'2px'}}/>
                  </div>
                  <div style={S("flex:1; min-width:0; margin-bottom:12px;")}>
                    <button onClick={()=>this.toggleStep('live-'+i)} style={{...S("width:100%; display:flex; align-items:center; gap:12px; text-align:left; background:var(--surface); border:1px solid var(--border); padding:13px 16px; color:var(--text2);"), borderRadius: open ? '8px 8px 0 0' : '8px'}}>
                      <span style={S("color:var(--text3); font-family:var(--font-mono); font-size:11px; flex:none;")}>{step.tool}</span>
                      <span style={S("color:var(--text); font-weight:600; font-size:13.5px; flex:none;")}>{step.title}</span>
                      <span style={S("color:var(--text3); font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0;")}>— {step.summary}</span>
                      <Svg w={16} h={16} style={{color:'var(--text3)',flex:'none',transition:'transform .2s',transform:open?'rotate(180deg)':'none'}} d="m6 9 6 6 6-6"/>
                    </button>
                    {open && (
                      <div className="qa-fade" style={S("border:1px solid var(--border); border-top:none; border-radius:0 0 8px 8px; margin-top:-1px; padding:16px; background:var(--surface);")}>
                        {step.detail
                          ? <pre style={S("margin:0; background:var(--code-bg); color:var(--code-fg); padding:14px; border-radius:6px; font-size:12px; line-height:1.6; overflow:auto; white-space:pre-wrap; max-height:340px;")}>{step.detail}</pre>
                          : <div style={S("color:var(--text3); font-size:12.5px;")}>{step.summary}</div>}
                        {step.image && <img src={step.image} alt="repro screenshot" style={{display:'block',width:'100%',marginTop:'12px',borderRadius:'6px',border:'1px solid var(--border)'}}/>}
                      </div>
                    )}
                  </div>
                </div>
              );})}
            </div>
          </div>
          {/* VERDICT PANEL */}
          <div style={S("position:sticky; top:0;")}>
            <div style={S("background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:18px;")}>
              <div style={S("display:flex; align-items:center; gap:8px; margin-bottom:4px;")}>
                <span style={S("color:var(--text); font-weight:600; font-size:15px;")}>Verdict</span>
                <span style={S("margin-left:auto; font-size:10.5px; color:var(--text3); display:inline-flex; align-items:center; gap:4px;")}><Svg w={12} h={12} d="M16 7a4 4 0 1 0-8 0M3 21h18M5 21V11h14v10"/>You decide</span>
              </div>
              <p style={S("color:var(--text3); font-size:12px; line-height:1.5; margin:0 0 14px;")}>The engine gathered the evidence above against the live build. You own the call — confirm it below.</p>
              <div style={S("display:flex; flex-direction:column; gap:7px; margin-bottom:16px;")}>
                {this.VERDICTS.map((opt,i)=>{ const c=this.CHIP[opt]; const sel=opt===selected; return (
                  <button key={i} onClick={()=>this.selectVerdictLive(n,opt)} style={{display:'flex',alignItems:'center',gap:'10px',width:'100%',textAlign:'left',padding:'10px 12px',borderRadius:'7px',cursor:'pointer',background:sel?'var(--accent-tint)':'var(--well)',border:sel?'1px solid var(--accent)':'1px solid var(--border)'}}>
                    <span style={{width:'14px',height:'14px',borderRadius:'50%',flex:'none',border:'2px solid '+(sel?c.fg:'var(--border)'),display:'flex',alignItems:'center',justifyContent:'center'}}>{sel && <span style={{width:'7px',height:'7px',borderRadius:'50%',background:c.fg}}/>}</span>
                    <span style={{fontWeight:600,fontSize:'13px',color:'var(--text)'}}>{opt}</span>
                  </button>
                );})}
              </div>
              {confirmed
                ? <div style={S("display:flex; align-items:center; gap:8px; padding:10px 12px; background:rgba(61,182,123,.10); border:1px solid rgba(61,182,123,.3); border-radius:6px; color:var(--success); font-size:12.5px; font-weight:600; margin-bottom:14px;")}><Svg w={15} h={15} sw={2.4} d="M20 6 9 17l-5-5"/>Confirmed by {this.USER.name}</div>
                : <button onClick={()=>this.confirmVerdictLive(n)} style={S("width:100%; height:40px; background:var(--accent); color:#fff; border:none; border-radius:6px; font-weight:600; font-size:13.5px; margin-bottom:14px;")}>Confirm verdict</button>}
              <div style={S("color:var(--text3); font-size:11px; letter-spacing:.05em; text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between;")}>
                <span>QA comment</span>
                <button onClick={()=>{ try{navigator.clipboard&&navigator.clipboard.writeText(rep.qaComment);}catch(e){} this.setState({toast:'QA comment copied'}); this.flashToast(); }} style={S("background:transparent; border:none; color:var(--accent); font-size:11px; font-weight:600; display:inline-flex; align-items:center; gap:4px; padding:0;")}><Svg w={12} h={12}><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></Svg>Copy</button>
              </div>
              <textarea readOnly value={rep.qaComment} style={S("width:100%; height:148px; resize:none; background:var(--well); border:1px solid var(--border); border-radius:6px; padding:11px; color:var(--text2); font-size:12px; line-height:1.6; outline:none;")}/>
              {selected==='Fixed'
                ? (<>
                    <button onClick={()=>this.genSpec(n)} style={S("width:100%; height:40px; margin-top:12px; background:var(--accent); color:#1a1c21; border:none; border-radius:6px; font-weight:600; font-size:13px; display:flex; align-items:center; justify-content:center; gap:8px;")}><Svg w={15} h={15} stroke="#1a1c21" d="M3 12h4l3-8 4 16 3-8h4"/>Generate Playwright test</button>
                    <button onClick={this.openDraft} style={S("width:100%; height:34px; margin-top:8px; background:transparent; border:none; color:var(--text3); font-size:12px;")}>or draft a GitHub issue</button>
                  </>)
                : (<>
                    <button onClick={this.openDraft} style={S("width:100%; height:40px; margin-top:12px; background:var(--accent); color:#1a1c21; border:none; border-radius:6px; font-weight:600; font-size:13px; display:flex; align-items:center; justify-content:center; gap:8px;")}><Svg w={15} h={15} fill="#1a1c21" stroke="none" d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49v-1.7c-2.78.62-3.37-1.21-3.37-1.21-.46-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.62.07-.62 1 .07 1.53 1.06 1.53 1.06.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.36-2.22-.26-4.55-1.14-4.55-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.27 2.75 1.05a9.4 9.4 0 0 1 5 0c1.91-1.32 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.06.36.32.68.94.68 1.9v2.81c0 .27.18.6.69.49A10.26 10.26 0 0 0 22 12.25C22 6.58 17.52 2 12 2z"/>Draft GitHub issue</button>
                    <button onClick={()=>this.genSpec(n)} style={S("width:100%; height:34px; margin-top:8px; background:transparent; border:none; color:var(--text3); font-size:12px;")}>or generate a Playwright test</button>
                  </>)}
            </div>
            <div style={S("margin-top:14px; padding:13px 15px; background:var(--surface); border:1px solid var(--border); border-radius:8px; display:flex; gap:9px;")}><Svg w={15} h={15} stroke="var(--text3)" style={S("flex:none; margin-top:1px;")}><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></Svg><span style={S("font-size:11.5px; color:var(--text3); line-height:1.5;")}>Reads are free. Live-instance writes and issue submission always require an explicit confirm.</span></div>
          </div>
        </div>
      </div>
    );
  }

  renderDraft(v){
    return (
      <div onClick={this.closeModal} style={S("position:fixed; inset:0; background:rgba(25,33,71,.5); display:flex; align-items:flex-start; justify-content:center; padding:48px 24px; z-index:60; overflow:auto;")}>
        <div onClick={this.stop} className="qa-fade" style={S("width:680px; max-width:100%; background:var(--surface); border:1px solid var(--border); border-radius:12px; box-shadow:0 12px 40px rgba(0,0,0,.4); overflow:hidden;")}>
          <div style={S("display:flex; align-items:center; gap:10px; padding:16px 20px; border-bottom:1px solid var(--border);")}>
            <Svg w={18} h={18} fill="var(--text)" stroke="none" d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49v-1.7c-2.78.62-3.37-1.21-3.37-1.21-.46-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.62.07-.62 1 .07 1.53 1.06 1.53 1.06.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.36-2.22-.26-4.55-1.14-4.55-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.27 2.75 1.05a9.4 9.4 0 0 1 5 0c1.91-1.32 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.06.36.32.68.94.68 1.9v2.81c0 .27.18.6.69.49A10.26 10.26 0 0 0 22 12.25C22 6.58 17.52 2 12 2z"/>
            <span style={S("color:var(--text); font-weight:600; font-size:15px;")}>New issue · fleetdm/fleet</span>
            <span style={S("font-size:11px; color:var(--text3); background:var(--well); padding:3px 8px; border-radius:4px;")}>bug report template</span>
            <button onClick={this.closeModal} style={S("margin-left:auto; width:30px; height:30px; background:transparent; border:none; color:var(--text3); display:flex; align-items:center; justify-content:center;")}><Svg w={18} h={18} d="M18 6 6 18M6 6l12 12"/></button>
          </div>
          <div style={S("padding:20px; max-height:54vh; overflow:auto;")}>
            <div style={S("color:var(--text3); font-size:11px; letter-spacing:.05em; text-transform:uppercase; margin-bottom:6px;")}>Title</div>
            <div style={S("background:var(--well); border:1px solid var(--border); border-radius:6px; padding:11px 13px; color:var(--text); font-weight:600; font-size:14px; margin-bottom:16px;")}>{v.draftTitle}</div>
            <div style={S("color:var(--text3); font-size:11px; letter-spacing:.05em; text-transform:uppercase; margin-bottom:6px;")}>Description</div>
            <pre style={S("margin:0 0 16px; background:var(--well); color:var(--text2); padding:14px; border-radius:6px; font-size:12px; line-height:1.65; white-space:pre-wrap;")}>{v.draftBody}</pre>
            <div style={S("color:var(--text3); font-size:11px; letter-spacing:.05em; text-transform:uppercase; margin-bottom:8px;")}>Labels</div>
            <div style={S("display:flex; gap:8px; flex-wrap:wrap;")}>{v.draftLabels.map((lb,i)=><span key={i} style={S("font-family:var(--font-mono); font-size:11.5px; background:var(--accent-tint); color:var(--accent); padding:4px 10px; border-radius:20px;")}>{lb}</span>)}</div>
          </div>
          <div style={S("display:flex; align-items:center; gap:12px; padding:16px 20px; border-top:1px solid var(--border); background:var(--bg);")}>
            <Svg w={15} h={15} stroke="var(--warning)" style={S("flex:none;")} d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z|M12 9v4M12 17h.01"/>
            <span style={S("flex:1; font-size:12px; color:var(--text3);")}>This is a draft. Submitting opens GitHub with the issue prefilled — nothing is posted automatically.</span>
            <button onClick={this.closeModal} style={S("height:38px; padding:0 16px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text2); font-weight:600; font-size:13px;")}>Cancel</button>
            <button onClick={this.confirmSubmit} style={S("height:38px; padding:0 18px; background:var(--green); color:#fff; border:none; border-radius:6px; font-weight:600; font-size:13px; display:inline-flex; align-items:center; gap:7px;")}>Open in GitHub<Svg w={14} h={14} d="M7 17 17 7M9 7h8v8"/></button>
          </div>
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById('app')).render(<Studio/>);
</script>
</body>
</html>
